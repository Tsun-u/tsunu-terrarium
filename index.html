<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>🌱 像素生態瓶</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16303e">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #1a1e2a;
    color: #e8ecf4;
    line-height: 1.5;
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    touch-action: manipulation;
  }
  /* 鍵盤操作者的焦點指示（a11y） */
  button:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(255, 213, 79, .85);
  }
  /* 世界畫布：等比 contain（整個世界一眼可見）、精確貼合視窗留最小邊 */
  #world {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    image-rendering: pixelated;
    background: #000;
  }
  /* 角落 icon 按鈕（半透明、無文字） */
  .corner-btn {
    position: fixed; z-index: 50;
    width: 46px; height: 46px; border: none; border-radius: 14px;
    background: rgba(255,255,255,.12); font-size: 22px; cursor: pointer;
    backdrop-filter: blur(2px);
    transition: background .15s, transform .12s;
  }
  .corner-btn:active { transform: scale(.92); background: rgba(255,255,255,.25); }
  #btnTree  { left: 12px;  bottom: 12px; }
  #btnShop  { left: 66px;  bottom: 12px; filter: brightness(1.45) saturate(1.25); }
  #btnBottles { left: 120px; bottom: 12px; }
  #btnSpeed { left: 174px; bottom: 12px; font-size: 15px; font-weight: bold; color: #dde; }
  #btnStars { right: 120px; bottom: 12px; }
  #btnMusic { right: 66px; bottom: 12px; }
  #btnSound { right: 12px; bottom: 12px; }
  .corner-btn.off { opacity: .55; filter: grayscale(.8); }
  /* 音樂關閉：紅色斜線壓在音符上，一眼可辨 */
  #btnMusic.off::after {
    content: ''; position: absolute; left: 7px; right: 7px; top: 50%;
    height: 3.5px; margin-top: -2px; background: #ff5d5d; border-radius: 2px;
    transform: rotate(-45deg); opacity: 1; filter: none;
  }
  /* GitHub 連結（左上，開新分頁看原始碼） */
  #btnGithub {
    left: 12px; top: 12px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }
  #btnGithub svg { width: 24px; height: 24px; fill: #e8ecf4; opacity: .85; }
  /* 說明書（左上第二顆，連到 README） */
  #btnHelp {
    left: 66px; top: 12px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 22px;
  }
  /* 語言切換（左上第三顆，顯示要切過去的語言） */
  #btnLang { left: 120px; top: 12px; font-size: 15px; font-weight: bold; color: #dde; }
  /* 愛心計數（右上，唯一常駐數字） */
  #hearts {
    position: fixed; right: 14px; top: 12px; z-index: 50;
    padding: 6px 14px; border-radius: 14px;
    background: rgba(255,255,255,.12); backdrop-filter: blur(2px);
    color: #ffd3dd; font-size: 18px; font-weight: bold;
  }
  /* UI 面板的掛載點（ui.js 動態填內容） */
  #uiLayer { position: fixed; inset: 0; z-index: 60; pointer-events: none; }
  #uiLayer > * { pointer-events: auto; }
</style>
</head>
<body>
<canvas id="world"></canvas>
<div id="hearts">❤ <span id="heartNum">0</span></div>
<a class="corner-btn" id="btnGithub" href="https://github.com/Tsun-u/tsunu-terrarium"
   target="_blank" rel="noopener" title="GitHub" aria-label="在 GitHub 檢視原始碼">
  <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
</a>
<a class="corner-btn" id="btnHelp" href="https://github.com/Tsun-u/tsunu-terrarium#readme"
   target="_blank" rel="noopener" title="說明書" aria-label="開啟遊戲說明">📖</a>
<button class="corner-btn" id="btnLang" title="Language">EN</button>
<button class="corner-btn" id="btnTree"  title="族譜">🌳</button>
<button class="corner-btn" id="btnShop"  title="商店">🛍️</button>
<button class="corner-btn" id="btnBottles" title="瓶子">🫙</button>
<button class="corner-btn" id="btnSpeed" title="速度">▶</button>
<button class="corner-btn" id="btnStars" title="星空">⭐</button>
<button class="corner-btn" id="btnMusic" title="音樂">🎵</button>
<button class="corner-btn" id="btnSound" title="音效">🔊</button>
<div id="uiLayer"></div>

<script src="contract.js"></script>
<script src="genetics.js"></script>
<script src="sim.js"></script>
<script src="render.js"></script>
<script src="ui.js"></script>
<script src="audio.js"></script>
<script src="ceremony.js"></script>
<script src="bottles.js"></script>
<script src="drive.js"></script>
<script>
/* ---------- 開機流程 ---------- */

// 語言：偏好優先，否則跟瀏覽器（中文圈→zh、其他→en）。文字面極小，
// 字典就這一份：按鈕提示、頁標題、說明書連結。瓶名/動物名由 bottles/sim 讀 C.LANG。
(function initLang() {
  let lang = null;
  try { lang = JSON.parse(localStorage.getItem('terrarium_prefs') || '{}').lang; } catch (e) {}
  C.LANG = lang || (navigator.language && navigator.language.startsWith('zh') ? 'zh' : 'en');
  const T = C.LANG === 'zh' ? {
    title: '🌱 像素生態瓶', github: '在 GitHub 檢視原始碼', help: '開啟遊戲說明',
    readme: 'https://github.com/Tsun-u/tsunu-terrarium#readme',
    btns: { btnTree: '族譜', btnShop: '商店', btnBottles: '瓶子', btnSpeed: '速度',
      btnStars: '星空', btnMusic: '音樂', btnSound: '音效', btnHelp: '說明書', btnLang: 'English' },
  } : {
    title: '🌱 Pixel Terrarium', github: 'View source on GitHub', help: 'Open the game guide',
    readme: 'https://github.com/Tsun-u/tsunu-terrarium/blob/main/README.en.md',
    btns: { btnTree: 'Family tree', btnShop: 'Shop', btnBottles: 'Bottles', btnSpeed: 'Speed',
      btnStars: 'Star gallery', btnMusic: 'Music', btnSound: 'Sound', btnHelp: 'Guide', btnLang: '中文' },
  };
  C._T = T;
  document.title = T.title;
  for (const [id, tip] of Object.entries(T.btns)) {
    const el = document.getElementById(id);
    if (el) el.title = tip;
  }
  const gh = document.getElementById('btnGithub');
  gh.setAttribute('aria-label', T.github);
  const help = document.getElementById('btnHelp');
  help.href = T.readme;
  help.setAttribute('aria-label', T.help);
  // 🌐 鈕顯示「切過去的語言」，點了存偏好並重載
  const lb = document.getElementById('btnLang');
  lb.textContent = C.LANG === 'zh' ? 'EN' : '中';
  lb.onclick = () => {
    let p = {};
    try { p = JSON.parse(localStorage.getItem('terrarium_prefs') || '{}'); } catch (e) {}
    p.lang = C.LANG === 'zh' ? 'en' : 'zh';
    localStorage.setItem('terrarium_prefs', JSON.stringify(p));
    location.reload();
  };
})();

// 時間倍速：玩家偏好（⏩ 按鈕，1/2/5/10）先套用；?fast=N 除錯參數優先蓋過。
// 需在 Sim.load 之前設定，離線折算才會跟著玩家選的節奏。
(function readTimeScale() {
  try {
    const p = JSON.parse(localStorage.getItem('terrarium_prefs') || '{}');
    if ([2, 5, 10].includes(p.speed)) C.TIME_SCALE = p.speed;
  } catch (e) {}
  const n = +new URLSearchParams(location.search).get('fast');
  if (n > 1) { C.TIME_SCALE = Math.min(n, 86400); C._FAST_DEBUG = true; }
})();

// 等比 contain：整個世界一眼可見、絕不變形；精確縮放讓邊留到最小
function fitCanvas() {
  const cv = document.getElementById('world');
  if (cv.width !== C.WORLD_W) { cv.width = C.WORLD_W; cv.height = C.WORLD_H; }
  const scale = Math.max(1, Math.min(
    window.innerWidth / C.WORLD_W, window.innerHeight / C.WORLD_H));
  cv.style.width = Math.floor(C.WORLD_W * scale) + 'px';
  cv.style.height = Math.floor(C.WORLD_H * scale) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// 世界初始化（模組尚未實作時安靜跳過，骨架期可先開頁驗版面）
let world = null;
function startLoops(rng) {
  // 100ms 節拍器＋累加器：把 TIME_SCALE 個 tick 平均鋪滿整秒，
  // 加速時移動才是連續滑行而不是「一秒跳一大步」的頓挫
  let acc = 0;
  setInterval(() => {
    if (!world) return;
    acc += C.TIME_SCALE / 10;
    const n = Math.floor(acc);
    if (!n) return;
    acc -= n;
    const events = [];
    for (let i = 0; i < n; i++) events.push(...Sim.tick(world, rng));
    if (Render.onEvents) Render.onEvents(world, events);
    if (UI.onEvents) UI.onEvents(world, events);
  }, 100);
  setInterval(() => {
    if (Sim.save && world) {
      Sim.save(world);
      if (window.Bottles && Bottles.hasMeta()) Bottles.touchSaved();
    }
  }, 30000);
  if (UI.init) UI.init(world);
  const btn = document.getElementById('btnBottles');
  if (window.Bottles && Bottles.hasMeta()) {
    document.title = `🌱 ${Bottles.activeName() || C._T.title.slice(2)}`;
    btn.onclick = () => Bottles.openPanel(world);
  } else if (btn) btn.style.display = 'none';
}
function boot() {
  if (typeof Sim.newWorld !== 'function') {
    console.log('[terrarium] 邏輯模組尚未就緒（骨架模式）');
    return;
  }
  const rng = rngFactory(Date.now() >>> 0);
  // 瓶子路由：決定進當前瓶還是辦開瓶儀式
  const route = window.Bottles ? Bottles.init()
    : (localStorage.getItem(C.SAVE_KEY) ? 'load' : 'ceremony');
  if (route === 'load') {
    const loaded = Sim.load ? Sim.load() : null;
    if (loaded) {
      world = loaded.world;
      // 地圖放大後的座標防護：把舊存檔的個體與裝飾夾回地面活動範圍
      const clampY = y => Math.min(C.WORLD_H - 8, Math.max(C.SKY_H + 8, y));
      const clampX = x => Math.min(C.WORLD_W - 8, Math.max(8, x));
      world.creatures.forEach(c => { c.x = clampX(c.x); c.y = clampY(c.y); });
      (world.decor || []).forEach(d => { if (d.kind !== 'pond') { d.x = clampX(d.x); d.y = clampY(d.y); } });
      if (loaded.offlineSec > 60) {
        const summary = Sim.fastForward(world, loaded.offlineSec, rng);
        if (UI.showSummary) UI.showSummary(world, summary);
      }
      world && startLoops(rng);
      return;
    }
  }
  if (window.Ceremony) {
    // 新瓶子：先辦開瓶儀式（命名＋自訂或骰八隻祖代），選好才誕生世界
    Ceremony.show((genes, name) => {
      if (window.Bottles) Bottles.createFromCeremony(name);
      world = Sim.newWorld(rng, genes);
      if (Sim.save) Sim.save(world);
      startLoops(rng);
    }, window.Bottles ? Bottles.defaultName() : (C.LANG === 'zh' ? '一號瓶' : 'Bottle 1'));
  } else {
    world = Sim.newWorld(rng);
    startLoops(rng);
  }
}
function frame(t) {
  if (world && Render.draw) Render.draw(world, t);
  requestAnimationFrame(frame);
}
boot();
requestAnimationFrame(frame);
</script>
</body>
</html>
